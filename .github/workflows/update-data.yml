name: Update Sponsorship Data

# Runs automatically on the 1st of Feb, May, Aug, Nov вЂ” roughly when DOL
# publishes the previous quarter's LCA disclosure files.
# Can also be triggered manually via the GitHub Actions UI.

on:
  workflow_dispatch:
    inputs:
      coverage:
        description: 'Coverage label shown in the panel (e.g. "FY2026 Q2 + FY2025")'
        required: false
        default: ''
  schedule:
    - cron: '0 6 1 2,5,8,11 *'   # 06:00 UTC on Feb 1, May 1, Aug 1, Nov 1

permissions:
  contents: write   # needed to create GitHub Releases

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm install

      # в”Ђв”Ђ Determine fiscal year & quarter в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      # DOL fiscal year runs Oct 1 вЂ“ Sep 30.
      # Quarters: Q1 Oct-Dec, Q2 Jan-Mar, Q3 Apr-Jun, Q4 Jul-Sep
      - name: Determine current period
        id: period
        run: |
          MONTH=$(date -u +'%-m')
          YEAR=$(date -u +'%Y')

          if   [ "$MONTH" -ge 10 ]; then FY=$((YEAR + 1)); Q=1
          elif [ "$MONTH" -le  3 ]; then FY=$YEAR;         Q=2
          elif [ "$MONTH" -le  6 ]; then FY=$YEAR;         Q=3
          else                           FY=$YEAR;         Q=4
          fi

          PREV_FY=$((FY - 1))
          echo "FY=$FY"       >> "$GITHUB_OUTPUT"
          echo "Q=$Q"         >> "$GITHUB_OUTPUT"
          echo "PREV_FY=$PREV_FY" >> "$GITHUB_OUTPUT"

      # в”Ђв”Ђ Download DOL OFLC files в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      # DOL publishes files at predictable URLs. Files for future quarters
      # return 404 and are skipped safely.
      - name: Download DOL OFLC XLSX files
        env:
          FY: ${{ steps.period.outputs.FY }}
          Q: ${{ steps.period.outputs.Q }}
          PREV_FY: ${{ steps.period.outputs.PREV_FY }}
          BASE: https://www.dol.gov/sites/dolgov/files/ETA/oflc/pdfs
        run: |
          mkdir -p data/raw

          echo "=== Current FY${FY} LCA (Q1 through Q${Q}) ==="
          for QN in 1 2 3 4; do
            if [ "$QN" -le "$Q" ]; then
              FILE="LCA_Disclosure_Data_FY${FY}_Q${QN}.xlsx"
              curl -fsSL "$BASE/$FILE" -o "data/raw/$FILE" \
                && echo "  вњ“ $FILE" \
                || echo "  вњ— $FILE (not yet published, skipping)"
            fi
          done

          echo "=== Previous FY${PREV_FY} LCA (all quarters) ==="
          for QN in 1 2 3 4; do
            FILE="LCA_Disclosure_Data_FY${PREV_FY}_Q${QN}.xlsx"
            curl -fsSL "$BASE/$FILE" -o "data/raw/$FILE" \
              && echo "  вњ“ $FILE" \
              || echo "  вњ— $FILE (skipping)"
          done

          echo "=== PERM files ==="
          for PERM_FY in "$FY" "$PREV_FY"; do
            FILE="PERM_Disclosure_Data_FY${PERM_FY}.xlsx"
            curl -fsSL "$BASE/$FILE" -o "data/raw/$FILE" \
              && echo "  вњ“ $FILE" \
              || echo "  вњ— $FILE (skipping)"
          done

          echo ""
          echo "Downloaded files:"
          ls -lh data/raw/ || echo "(none)"

      # в”Ђв”Ђ Build the sponsorship index + per-letter shards в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      # --out writes the full index (used only by the smoke test, not uploaded)
      # --shard-dir writes sponsorship-A.json вЂ¦ sponsorship-Z.json (released assets)
      - name: Build sponsorship index
        env:
          FY: ${{ steps.period.outputs.FY }}
          Q: ${{ steps.period.outputs.Q }}
          PREV_FY: ${{ steps.period.outputs.PREV_FY }}
        run: |
          # Collect downloaded files
          LCA_FILES=$(ls data/raw/LCA_*.xlsx 2>/dev/null || true)
          PERM_FILES=$(ls data/raw/PERM_*.xlsx 2>/dev/null || true)

          if [ -z "$LCA_FILES" ] && [ -z "$PERM_FILES" ]; then
            echo "No data files downloaded вЂ” aborting."
            exit 1
          fi

          # Build --lca and --perm argument lists
          LCA_ARGS=$(echo "$LCA_FILES" | sed 's/^/--lca /' | tr '\n' ' ')
          PERM_ARGS=$(echo "$PERM_FILES" | sed 's/^/--perm /' | tr '\n' ' ')

          # Coverage label: prefer workflow input, fall back to auto
          COVERAGE="${{ github.event.inputs.coverage }}"
          if [ -z "$COVERAGE" ]; then
            COVERAGE="FY${FY} Q${Q} + FY${PREV_FY}"
          fi

          node scripts/prepare-data.mjs \
            $LCA_ARGS \
            $PERM_ARGS \
            --coverage "$COVERAGE" \
            --out extension/data/sponsorship-index.json \
            --shard-dir data/shards

          echo ""
          echo "Full index size : $(ls -lh extension/data/sponsorship-index.json | awk '{print $5}')"
          echo "Shard count     : $(ls data/shards/sponsorship-*.json | wc -l)"
          echo "Largest shard   : $(ls -lhS data/shards/sponsorship-*.json | head -1 | awk '{print $5, $9}')"

      # в”Ђв”Ђ Validate the index в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Validate index (smoke test)
        run: node scripts/index-smoke.mjs

      # в”Ђв”Ђ Publish shards as a GitHub Release в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      # Only the per-letter shards are uploaded (each ~5 MB compressed).
      # The full 125 MB sponsorship-index.json is NOT uploaded вЂ” it is only
      # used locally by the smoke test above.
      - name: Get release date
        id: date
        run: echo "date=$(date -u +'%Y-%m-%d')" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: data-${{ steps.date.outputs.date }}
          name: "Sponsorship data вЂ” ${{ steps.date.outputs.date }}"
          body: |
            Automated update of the DOL OFLC sponsorship index (per-letter shards).

            The extension fetches only the shard for the first letter of the company
            being looked up (~1вЂ“5 MB per shard), rather than the full 125 MB index.

            **Coverage:** ${{ github.event.inputs.coverage || format('FY{0} Q{1} + FY{2}', steps.period.outputs.FY, steps.period.outputs.Q, steps.period.outputs.PREV_FY) }}
            **Generated:** ${{ steps.date.outputs.date }}
            **Source:** [DOL OFLC Performance Data](https://www.dol.gov/agencies/eta/foreign-labor/performance)
          files: data/shards/sponsorship-*.json
          make_latest: true
