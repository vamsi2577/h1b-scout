name: Tests

on:
  pull_request:
  push:
    branches: [main, staging/test]

# Least privilege: the test job only needs to read the repo contents.
permissions:
  contents: read

jobs:
  node-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      # Tests are pure Node (node:test) with no runtime deps; npm ci just
      # restores the locked devDependencies so the install is reproducible.
      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
