<!DOCTYPE html>
<html>
<head>
    <title>Malicious Site Simulation</title>
</head>
<body>
    <h1>Malicious Site Simulation</h1>
    <p>This page attempts to send unauthorized messages to the H1B Scout extension.</p>
    <div id="status">Ready...</div>

    <script>
        async function attemptAttack() {
            const urlParams = new URLSearchParams(window.location.search);
            const extensionId = urlParams.get('id');
            const statusDiv = document.getElementById('status');

            if (!extensionId) {
                statusDiv.textContent = "Error: No extension ID provided in URL (?id=...)";
                return;
            }

            statusDiv.textContent = `Attempting attack on extension: ${extensionId}...`;

            const payloads = [
                { type: "JOB_CONTEXT_FOUND", companyName: "MALICIOUS_CORP", jobTitle: "Hacker" },
                { type: "LOOKUP_OVERRIDE", companyName: "SPOOFED", jobTitle: "SPOOFED" },
                { type: "GET_PANEL_DATA", tabId: 123 }
            ];

            for (const payload of payloads) {
                try {
                    console.log("Sending payload:", payload);
                    // This should fail because externally_connectable is not set, 
                    // and even if it was, onMessage (internal) wouldn't trigger.
                    // If we were a content script, we could send these, but as a web page we can't.
                    chrome.runtime.sendMessage(extensionId, payload, (response) => {
                        const error = chrome.runtime.lastError;
                        if (error) {
                            console.log(`Payload ${payload.type} rejected:`, error.message);
                        } else {
                            console.log(`Payload ${payload.type} accepted?`, response);
                        }
                    });
                } catch (e) {
                    console.log(`Exception sending ${payload.type}:`, e.message);
                }
            }
            
            statusDiv.textContent = "Attack finished. Check console for details.";
        }

        // Wait a bit to ensure script runs after load
        setTimeout(attemptAttack, 1000);
    </script>
</body>
</html>
